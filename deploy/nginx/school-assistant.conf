upstream fastapi {
    server localhost:8000;
}

upstream streamlit {
    server localhost:8501;
}

server {
    listen 80;
    listen [::]:80;
    server_name smartschoolassistant.com www.smartschoolassistant.com;
    
    location ~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name smartschoolassistant.com www.smartschoolassistant.com;
    
    ssl_certificate /etc/letsencrypt/live/smartschoolassistant.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartschoolassistant.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    client_max_body_size 10M;
    
    # Frontend (Streamlit)
    location / {
        proxy_pass http://streamlit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # API (FastAPI)
    location /api/ {
        proxy_pass http://fastapi/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # FastAPI docs
    location /docs {
        proxy_pass http://fastapi/docs;
        proxy_set_header Host $host;
    }
    
    location /redoc {
        proxy_pass http://fastapi/redoc;
        proxy_set_header Host $host;
    }
    
    location /openapi.json {
        proxy_pass http://fastapi/openapi.json;
        proxy_set_header Host $host;
    }
}
