version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: school_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: school_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/school_db
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./config:/app/config
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  ollama:
    image: ollama/ollama:latest
    container_name: school_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Note: Model needs to be pulled manually: docker exec school_ollama ollama pull deepseek-r1:7b

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: school_frontend
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend

volumes:
  postgres_data:
  ollama_data:
