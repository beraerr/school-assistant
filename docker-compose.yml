version: '3.8'

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: school_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: school_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school_backend
    env_file: .env                  # ANTHROPIC_API_KEY, ANTHROPIC_MODEL, SECRET_KEY buradan gelir
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/school_db
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data_science:/app/data_science  # pipeline çıktıları (winner_model.pkl vb.)
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend (Streamlit) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: school_frontend
    env_file: .env
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./data_science:/app/data_science  # DS sekmesi görselleri canlı güncellenir

volumes:
  postgres_data:
